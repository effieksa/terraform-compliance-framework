name: Terraform CD — Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        type: choice
        options: [dev, staging, prod]
      dry_run:
        description: "Dry run (plan only, no apply)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.6.4"

jobs:
  # Auto-deploy to dev on every merge to main
  deploy-dev:
    name: "Deploy → dev"
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (dev OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_DEV }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_DEV }}"

      - name: Terraform Apply
        working-directory: environments/dev
        if: github.event.inputs.dry_run != 'true'
        run: terraform apply -var-file="terraform.tfvars" -auto-approve -no-color

      - name: Terraform Plan (dry run)
        working-directory: environments/dev
        if: github.event.inputs.dry_run == 'true'
        run: terraform plan -var-file="terraform.tfvars" -no-color

  # Deploy to staging after dev succeeds — requires manual approval
  deploy-staging:
    name: "Deploy → staging"
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging  # GitHub environment with required reviewers configured
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (staging OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: environments/staging
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_STAGING }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_STAGING }}"

      - name: Terraform Apply
        working-directory: environments/staging
        run: terraform apply -var-file="terraform.tfvars" -auto-approve -no-color

  # Production deploy requires explicit workflow_dispatch + manual approval
  deploy-prod:
    name: "Deploy → prod"
    runs-on: ubuntu-latest
    environment: prod  # Requires 2 senior engineer approvals
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (prod OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: environments/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_PROD }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_PROD }}"

      - name: Terraform Plan (always run — review before apply)
        id: plan
        working-directory: environments/prod
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan.binary \
            -no-color \
            -detailed-exitcode
        continue-on-error: true

      - name: Apply only if changes exist
        working-directory: environments/prod
        if: steps.plan.outputs.exitcode == '2' && github.event.inputs.dry_run != 'true'
        run: terraform apply tfplan.binary -no-color

  # Scheduled drift detection — runs daily
  drift-detection:
    name: "Drift Detection (scheduled)"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        environment: [dev, staging, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_PLAN_ROLE_ARN_{0}', matrix.environment)] }}
          aws-region: us-east-1

      - name: Detect drift
        id: drift
        working-directory: environments/${{ matrix.environment }}
        run: |
          terraform init -backend-config="..."
          terraform plan -detailed-exitcode -no-color 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Alert on drift detected
        if: steps.drift.outputs.exit_code == '2'
        run: |
          echo "DRIFT DETECTED in ${{ matrix.environment }} environment"
          # In production: send PagerDuty alert, Slack notification, etc.
          # curl -X POST ${{ secrets.PAGERDUTY_ENDPOINT }} \
          #   -H "Content-Type: application/json" \
          #   -d '{"routing_key": "${{ secrets.PAGERDUTY_KEY }}", "event_action": "trigger", ...}'
